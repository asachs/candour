name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build --verbosity normal

  build-functions:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet publish src/Candour.Functions -c Release -o ./publish-functions
      - name: Zip Functions artifact
        run: cd publish-functions && zip -r ../candour-functions.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: candour-functions
          path: candour-functions.zip

  build-web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet publish src/Candour.Web -c Release -o ./publish-web
      - name: Zip Web artifact
        run: cd publish-web/wwwroot && zip -r ../../candour-web.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: candour-web
          path: candour-web.zip

  release:
    needs: [build-functions, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: candour-functions
      - uses: actions/download-artifact@v4
        with:
          name: candour-web
      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Extract the section for this version from CHANGELOG.md
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${TAG}" > release-notes.md
          fi
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            candour-functions.zip
            candour-web.zip

  smoke-test:
    if: vars.API_BASE_URL != ''
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment propagation
        run: sleep 30

      - name: Smoke test public endpoints
        env:
          API_BASE: ${{ vars.API_BASE_URL }}
        run: |
          set -euo pipefail
          FAKE_ID="00000000-0000-0000-0000-000000000000"

          echo "=== Public Endpoints ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/api/surveys/$FAKE_ID")
          [ "$STATUS" = "404" ] || { echo "FAIL: GET /surveys/{id} returned $STATUS, expected 404"; exit 1; }
          echo "PASS: GET /surveys/{id} → $STATUS"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            -d "{\"token\":\"fake\"}" \
            "$API_BASE/api/surveys/$FAKE_ID/validate-token")
          [ "$STATUS" = "200" ] || { echo "FAIL: POST /validate-token returned $STATUS, expected 200"; exit 1; }
          echo "PASS: POST /validate-token → $STATUS"

          echo "=== Admin Endpoints (expect 401) ==="
          for ENDPOINT in "api/surveys" "api/surveys/$FAKE_ID/results"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/$ENDPOINT")
            [ "$STATUS" = "401" ] || { echo "FAIL: GET /$ENDPOINT returned $STATUS, expected 401"; exit 1; }
            echo "PASS: GET /$ENDPOINT → $STATUS"
          done

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            -d '{}' \
            "$API_BASE/api/surveys")
          [ "$STATUS" = "401" ] || { echo "FAIL: POST /surveys returned $STATUS, expected 401"; exit 1; }
          echo "PASS: POST /surveys → $STATUS"

          echo "All smoke tests passed."

  e2e-test:
    if: vars.SWA_BASE_URL != ''
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: tests/e2e
        env:
          BASE_URL: ${{ vars.SWA_BASE_URL }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_SURVEY_ID: ${{ vars.TEST_SURVEY_ID }}
        run: npx playwright test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
