site_name: Candour
site_url: https://asachs.github.io/candour/
site_description: Anonymity-first survey platform — privacy enforced by architecture, not policy
site_author: Candour Contributors
repo_url: https://github.com/asachs/candour
repo_name: asachs/candour
edit_uri: edit/master/docs-site/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/asachs/candour
  generator: false

copyright: Copyright &copy; 2026 Candour Contributors — MIT License

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quickstart.md
      - Prerequisites: getting-started/prerequisites.md
  - Architecture:
      - Overview: architecture/overview.md
      - Data Model: architecture/data-model.md
      - Middleware Pipeline: architecture/middleware-pipeline.md
  - Security & Privacy:
      - Anonymity Architecture: security/anonymity.md
      - Threat Model: security/threat-model.md
      - Blind Token Scheme: security/blind-tokens.md
      - Engineering Mode: security/engineering-mode.md
  - Deployment:
      - Deployment Guide: deployment/guide.md
      - Infrastructure as Code: deployment/infrastructure.md
      - CI/CD Pipeline: deployment/cicd.md
  - API Reference:
      - Overview: api/overview.md
      - Surveys:
          - Create Survey: api/surveys/create.md
          - List Surveys: api/surveys/list.md
          - Get Survey: api/surveys/get.md
          - Publish Survey: api/surveys/publish.md
      - Responses:
          - Validate Token: api/responses/validate-token.md
          - Submit Response: api/responses/submit.md
      - Results:
          - Aggregate Results: api/results/aggregate.md
          - Export CSV: api/results/export.md
  - Admin Guide:
      - Dashboard: admin/dashboard.md
      - Creating Surveys: admin/creating-surveys.md
      - Publishing & Tokens: admin/publishing.md
      - Viewing Results: admin/viewing-results.md
  - Configuration:
      - Functions API: configuration/functions.md
      - Blazor WASM: configuration/wasm.md
      - Rate Limiting: configuration/rate-limiting.md
      - Auth Modes: configuration/auth-modes.md
  - Development:
      - Local Setup: development/local-setup.md
      - Project Structure: development/project-structure.md
      - Testing: development/testing.md
      - Contributing: development/contributing.md
  - Design Documents:
      - Rate Limiting: design/rate-limiting.md
      - Integration Testing: design/integration-testing.md
  - Changelog: changelog.md
