name: Deploy to Test

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build

  deploy-functions:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Functions
        run: dotnet publish src/Candour.Functions -c Release -o ./publish

      - name: Create zip package
        run: cd publish && zip -r ../app.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        run: |
          az functionapp deployment source config-zip \
            --resource-group "${{ vars.TEST_RESOURCE_GROUP }}" \
            --name "${{ vars.TEST_FUNCTION_APP_NAME }}" \
            --src app.zip

  deploy-web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish Web
        run: dotnet publish src/Candour.Web -c Release -o ./publish-web

      - name: Generate environment appsettings.json
        run: |
          cat > ./publish-web/wwwroot/appsettings.json <<EOF
          {
            "ApiBaseUrl": "${{ vars.API_BASE_URL }}",
            "EngineeringMode": true,
            "AzureAd": {
              "Enabled": true,
              "Authority": "https://login.microsoftonline.com/${{ vars.TEST_ENTRA_TENANT_ID }}",
              "ClientId": "${{ vars.TEST_ENTRA_CLIENT_ID }}",
              "ApiScope": "api://${{ vars.TEST_ENTRA_CLIENT_ID }}/access_as_user"
            }
          }
          EOF
          rm -f ./publish-web/wwwroot/appsettings.json.br ./publish-web/wwwroot/appsettings.json.gz

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./publish-web/wwwroot
          skip_app_build: true

  smoke-test:
    needs: [deploy-functions, deploy-web]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment propagation
        run: sleep 15

      - name: Smoke test API endpoints
        env:
          API_BASE: ${{ vars.API_BASE_URL }}
        run: |
          set -euo pipefail
          FAKE_ID="00000000-0000-0000-0000-000000000000"

          echo "=== Public Endpoints ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/api/surveys/$FAKE_ID")
          [ "$STATUS" = "404" ] || { echo "FAIL: GET /surveys/{id} returned $STATUS, expected 404"; exit 1; }
          echo "PASS: GET /surveys/{id} → $STATUS"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            -d "{\"token\":\"fake\"}" \
            "$API_BASE/api/surveys/$FAKE_ID/validate-token")
          [ "$STATUS" != "000" ] || { echo "FAIL: POST /validate-token could not connect"; exit 1; }
          echo "PASS: POST /validate-token → $STATUS (endpoint reachable)"

          echo "=== Admin Endpoints (expect 401) ==="
          for ENDPOINT in "api/surveys" "api/surveys/$FAKE_ID/results"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/$ENDPOINT")
            [ "$STATUS" = "401" ] || { echo "FAIL: GET /$ENDPOINT returned $STATUS, expected 401"; exit 1; }
            echo "PASS: GET /$ENDPOINT → $STATUS"
          done

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            -d '{}' \
            "$API_BASE/api/surveys")
          [ "$STATUS" = "401" ] || { echo "FAIL: POST /surveys returned $STATUS, expected 401"; exit 1; }
          echo "PASS: POST /surveys → $STATUS"

          echo "All smoke tests passed."

      - name: Smoke test SWA
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.SWA_BASE_URL }}")
          [ "$STATUS" = "200" ] || { echo "FAIL: SWA returned $STATUS, expected 200"; exit 1; }
          echo "PASS: SWA → $STATUS"

  e2e-test:
    needs: [deploy-functions, deploy-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: tests/e2e
        env:
          BASE_URL: ${{ vars.SWA_BASE_URL }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_SURVEY_ID: ${{ vars.TEST_SURVEY_ID }}
        run: npx playwright test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
